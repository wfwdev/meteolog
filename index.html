<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#060d1a" />
  <meta name="description" content="MeteoLog – személyes időjárás napló" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MeteoLog" />

  <title>MeteoLog</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <!-- Open Graph / link preview -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="MeteoLog – Személyes időjárás napló" />
  <meta property="og:description" content="Rögzítsd és kövesd a saját időjárási adataidat. Ingyenes PWA app." />
  <meta property="og:image"       content="icon-512.svg" />
  <meta name="twitter:card"       content="summary" />
  <meta name="description"        content="MeteoLog – személyes időjárás napló és megfigyelő rendszer." />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.svg" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Chart.js -->
  <script src="chart.min.js"></script>

  <!-- Main CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Splash / Loading -->
  <div id="splash">
    <div class="splash-inner">
      <div class="splash-icon">🌤️</div>
      <div class="splash-title">MeteoLog</div>
      <div class="splash-loader"><span></span><span></span><span></span></div>
      <div id="splash-error" style="display:none;margin-top:24px;background:#1a0a0a;border:1px solid #ef4444;border-radius:10px;padding:14px 16px;max-width:320px;text-align:left;">
        <div style="color:#ef4444;font-weight:700;margin-bottom:6px;">⚠️ Hiba történt</div>
        <div id="splash-error-msg" style="color:#fca5a5;font-size:13px;word-break:break-all;line-height:1.6;"></div>
      </div>
    </div>
  </div>

  <!-- Auth Modal -->
  <div id="auth-modal" class="modal hidden">
    <div class="modal-box">
      <!-- Logo -->
      <div class="auth-logo">
        <span class="auth-logo-icon">🌤️</span>
        <span class="auth-logo-title">MeteoLog</span>
      </div>

      <div id="auth-error" class="auth-error hidden"></div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Belépés</button>
        <button class="auth-tab" data-tab="register">Regisztráció</button>
      </div>

      <!-- Login form -->
      <div id="auth-login" class="auth-form">
        <input type="email" id="login-email" class="input" placeholder="E-mail cím" autocomplete="email" />
        <input type="password" id="login-password" class="input" placeholder="Jelszó" autocomplete="current-password" />
        <button id="btn-login" class="btn btn-primary">Bejelentkezés</button>
      </div>

      <!-- Register form -->
      <div id="auth-register" class="auth-form hidden">
        <input type="text" id="reg-name" class="input" placeholder="Becenév" />
        <input type="email" id="reg-email" class="input" placeholder="E-mail cím" autocomplete="email" />
        <input type="password" id="reg-password" class="input" placeholder="Jelszó (min. 6 karakter)" autocomplete="new-password" />
        <button id="btn-register" class="btn btn-primary">Fiók létrehozása</button>
      </div>

      <!-- Social -->
      <div class="auth-divider"><span>vagy</span></div>
      <div class="social-btns-row">
        <button id="btn-google" class="btn btn-social-sm">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Google
        </button>
        <button id="btn-facebook" class="btn btn-social-sm">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Facebook
        </button>
      </div>

      <button id="btn-guest" class="btn btn-ghost btn-guest-sm">Folytatás vendégként</button>
    </div>
  </div>

  <!-- Offline állapot jelző -->
  <div id="offline-banner" style="
    display:none;position:fixed;top:0;left:0;right:0;z-index:999;
    background:#f59e0b;color:#000;
    text-align:center;font-size:13px;font-weight:600;
    padding:6px 16px;
  ">
    📡 Offline mód – az adatok a net visszatértekor szinkronizálnak
  </div>

  <!-- App Shell -->
  <div id="app" class="hidden">

    <!-- Header -->
    <header id="app-header">
      <div class="header-left">
        <span class="header-logo">🌤️</span>
        <span class="header-title">MeteoLog</span>
      </div>
      <div class="header-right">
        <div id="location-selector" class="location-chip">
          <span class="loc-icon">📍</span>
          <span id="active-location-name">Betöltés...</span>
          <span class="loc-arrow">▾</span>
        </div>
        <button id="btn-header-auth" class="btn-icon" title="Fiók">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Location dropdown -->
    <div id="location-dropdown" class="dropdown hidden">
      <div id="location-list"></div>
      <button id="btn-add-location-quick" class="dropdown-add">＋ Új helyszín</button>
    </div>

    <!-- Main content -->
    <main id="app-main"></main>

    <!-- Bottom Navigation -->
    <nav id="app-nav">
      <button class="nav-btn active" data-view="dashboard">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Főoldal</span>
      </button>
      <button class="nav-btn" data-view="history">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Előzmény</span>
      </button>
      <button class="nav-btn nav-btn-center" data-view="log">
        <div class="nav-fab">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
        <span>Rögzítés</span>
      </button>
      <button class="nav-btn" data-view="charts">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Grafikonok</span>
      </button>
      <button class="nav-btn" data-view="locations">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>Helyszínek</span>
      </button>
    </nav>

  </div>

  <!-- Firebase konfiguráció (sima script, nem modul) -->
  <script src="firebase-config.js"></script>

  <!-- Firebase inicializálás -->
  <script type="module">
    function showSplashError(msg) {
      const box = document.getElementById('splash-error');
      const txt = document.getElementById('splash-error-msg');
      if (box && txt) { txt.textContent = msg; box.style.display = 'block'; }
    }

    try {
      const cfg = window.FIREBASE_CONFIG;
      if (!cfg || !cfg.apiKey || cfg.apiKey.includes('IDE_IRD')) {
        throw new Error('A firebase-config.js még nincs kitöltve! Cseréld ki az összes placeholder értéket a valódi Firebase adatokra.');
      }

      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
      const { getAuth }       = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js');
      const { getFirestore, enableIndexedDbPersistence, CACHE_SIZE_UNLIMITED } =
        await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');

      const app = initializeApp(cfg);
      const db  = getFirestore(app);

      // Offline perzisztencia bekapcsolása – adatok offline is menthetők
      // és automatikusan szinkronizálnak ha visszajön a net
      try {
        await enableIndexedDbPersistence(db);
      } catch(persistErr) {
        // Ha már be van kapcsolva (több lap) vagy nem támogatott: nem baj
        if (persistErr.code !== 'failed-precondition' && persistErr.code !== 'unimplemented') {
          console.warn('Offline perzisztencia nem elérhető:', persistErr.code);
        }
      }

      window.__firebase = {
        app,
        auth: getAuth(app),
        db
      };
      setTimeout(() => window.dispatchEvent(new Event('firebase-ready')), 0);
    } catch(e) {
      showSplashError(e.message || String(e));
    }
  </script>

  <!-- App JS (waits for firebase-ready) -->
  <script>
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
  </script>
  <script type="module" src="app.js"></script>

</body>
</html>
